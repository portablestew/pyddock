# Execution limits for both run_python and run_shell.
[execution]
timeout = 30
max_timeout = 3600

# Modules available to run_python snippets.
# Only top-level names are needed — submodules (e.g. xml.etree.ElementTree) are
# allowed automatically when the top-level package is listed.
#
# Each key is the Python module name (what you'd write after `import`);
# value is true (allowed) or false (revoked).
# String values are reserved for workspace modules (path to local package).
#
# SECURITY NOTE: Adding a module with its own file/network I/O (e.g. sqlite3,
# requests, urllib, http) may bypass pyddock's filesystem and network scoping.
# Only add modules whose I/O you trust or that have no I/O of their own.
[imports]
# Standard library — safe, no unpatched I/O
abc = true
argparse = true
ast = true
base64 = true
collections = true
contextlib = true
copy = true
csv = true
dataclasses = true
datetime = true
decimal = true
difflib = true
enum = true
fractions = true
functools = true
glob = true
hashlib = true
hmac = true
io = true
itertools = true
json = true
logging = true
math = true
operator = true
pathlib = true
pprint = true
random = true
re = true
secrets = true
statistics = true
string = true
struct = true
textwrap = true
time = true
types = true
typing = true
uuid = true
xml = true
# Standard library — patched/proxied by pyddock runtime
os = true
subprocess = true
sys = true
tempfile = true
# Third-party — controlled via [restrictions] sections below
#boto3 = true # Enable for AWS (opens network access vectors, even with reasonable restrictions)
cryptography = true # No I/O of its own; all file access goes through Python builtins
git = "GitPython" # [shell.git] policy enforced at the git.cmd.Git.execute chokepoint
polars = true
P4 = "p4python" # Restricted to non-submit operations

# Filesystem scoping for run_python.
# Paths are relative to the workspace root (the --workspace directory or CWD).
#   "."  = the workspace directory itself (and everything under it)
#   "*"  = unrestricted (entire host filesystem)
# Writes are always denied to .pyddock/ (self-modification protection) and to
# paths matching shell-executable script patterns (write-then-execute prevention).
[filesystem]
writable_paths = ["."]
readable_paths = ["*"]

# Path guards — regex patterns matched against the resolved absolute path
# (normalized to forward slashes). First match wins. Unmatched paths fall
# through to writable_paths/readable_paths logic above.
#
# Dispositions:
#   "deny-agent" — block agent code; trusted libraries (site-packages) can still access
#   "deny-all"   — block unconditionally, no caller bypass
#   "read-only"  — allow reads, block writes unconditionally
#   "workspace"  — allow only if the path is inside the workspace
#   "allow"      — permit unconditionally (override for specific paths)
[filesystem.guards]
'/\.ssh/' = "deny-agent"                  # SSH keys — paramiko/GitPython may need access
'/\.aws/credentials$' = "deny-agent"     # AWS credentials — boto3 needs access
'/\.aws/sso/cache/' = "deny-agent"       # AWS SSO tokens — boto3 needs access
'/\.aws/login/cache/' = "deny-agent"    # AWS SSO/OIDC login token cache — boto3 needs access
'/\.aws/cli/cache/' = "deny-agent"      # AWS assume-role credential cache — boto3 needs access
'/\.docker/config\.json$' = "deny-agent" # Docker registry auth — docker SDK may need access
'/\.kube/config$' = "deny-agent"         # Kubernetes credentials — k8s client may need access
'/\.gnupg/' = "deny-all"                 # GPG private keys — no library reader in sandbox
'/\.npmrc$' = "deny-all"                 # npm registry tokens — no library reader in sandbox
'/\.pypirc$' = "deny-all"               # PyPI registry tokens — no library reader in sandbox
'/\.git-credentials$' = "deny-all"       # Git plaintext passwords — no library reader in sandbox
'/\.env(\.[^/]*)?$' = "workspace"        # .env files — workspace only
'/\.git/' = "read-only"                   # Git internals — hooks execute as child processes (sandbox-escape vector); also blocks ref/config/index self-modification. Does NOT match .gitignore/.gitattributes/.gitmodules. git CLI writes happen in the child git.exe (a separate process), so allowed git operations are unaffected; only direct Python writes into .git/ (e.g. GitPython's pure-Python index.write()) are blocked.
'/\.kiro/agent' = "read-only"             # Kiro agent config — prevent self-modification
'/\.kiro/settings' = "read-only"          # Kiro settings — prevent self-modification
'/\.claude/settings' = "read-only"        # Claude settings — prevent self-modification

# AST-level static analysis — blocks dangerous constructs before execution.
# These prevent trivial jailbreaks (e.g. eval("__import__('os').system(...)")).
[ast]
block_calls = ["eval", "exec", "compile", "breakpoint", "__import__"]
# Frame/traceback/generator attributes are blocked to prevent sandbox escape via
# stack walking: an exception's traceback (e.__traceback__.tb_frame) or a
# generator/coroutine frame exposes f_globals/f_locals/f_back, which leak module
# namespaces (including enforcement internals and real module references).
# Blocking tb_frame/gi_frame/cr_frame/ag_frame severs traceback/generator -> frame;
# blocking f_back/f_globals/f_locals/f_builtins neutralizes any frame still obtained.
#
# The object-graph traversal primitives (__subclasses__/__bases__/__base__/__mro__)
# and the reflective accessors (__getattribute__/__getattr__) are blocked to raise
# the cost of the classic `type.__dict__['__subclasses__']` walk.
# NOTE (hardening scope): these names are enforced against attribute SYNTAX, the
# getattr/attrgetter builtins, and (via ast_validator) constant-keyed subscripts and
# reflective-call arguments. They are a first-line speed bump against accidental /
# copy-pasted escapes, NOT a boundary — a variable-keyed __dict__ subscript still
# reaches them. __class__ and __dict__ are deliberately NOT listed: blocking them
# would break common, legitimate library and snippet introspection (the global
# getattr guard would reject getattr(o, '__dict__') deep inside allowed libraries)
# for little adversarial gain. __reduce__/__reduce_ex__ are likewise NOT listed:
# CPython's enum machinery does getattr(enum_member, '__reduce_ex__') for every Enum
# subclass, so blocking them breaks any code (or library) that defines an enum.
# The durable fix is OS-level write enforcement.
block_attributes = ["__subclasses__", "__globals__", "__code__", "__bases__", "__base__", "__mro__", "__closure__", "__getattribute__", "__getattr__", "f_globals", "f_locals", "f_back", "f_builtins", "tb_frame", "gi_frame", "cr_frame", "ag_frame"]

# Audit-event policy table — enforced via sys.addaudithook, which fires beneath
# the Python name layer. This is the authoritative chokepoint that the
# monkeypatched open/FileIO/os cannot match: it catches operations that reach a
# real primitive through a live-object leak (e.g. type(sys.stdout.buffer.raw))
# or low-level os.open/os.replace.
#
# Each key is an audit event name (see the Python "Audit events table":
# https://docs.python.org/3/library/audit_events.html). A key may end in `*`
# for a prefix match (e.g. "ctypes.*" matches "ctypes.dlopen"); no other
# glob/regex syntax is supported. Dispositions:
#   fs            — open(): path-scoped read/write check (by mode/flags)
#   fs-write      — single-path mutation: check the target against write scope
#   fs-write-pair — two-path mutation (rename/link/symlink): check both targets
#   agent-deny    — deny when the caller is AGENT code; allow trusted libraries,
#                   stdlib, and import machinery. For primitives with no
#                   sanctioned agent use (defense-in-depth behind the import
#                   allowlist).
#   network       — network egress: deny from agent code, allow trusted
#                   libraries (host/port scoping is a future refinement)
#   shell         — subprocess spawn: validate the command vector against the
#                   [shell.*] policies (same allow/deny/arg_paths logic as
#                   run_shell and the subprocess proxy)
#   observe       — log only under `serve --debug`; no enforcement
#   allow         — explicit no-op (override a default to permit)
#
# Events not listed are ignored (hot events like object.__getattr__/builtins.id
# must stay absent). This table is the single source of truth: if a workspace
# config replaces the bundled default and omits [audit], the audit hook is
# inactive (the _fs_enforcement monkeypatches still provide first-line file
# scoping). Include [audit] to keep the audit-layer backstop.
[audit]
# --- filesystem scoping (the backstop for the _io.FileIO bypass) ---
"open" = "fs"
"os.rename" = "fs-write-pair"
"os.link" = "fs-write-pair"
"os.symlink" = "fs-write-pair"
"os.remove" = "fs-write"
"os.unlink" = "fs-write"
"os.mkdir" = "fs-write"
"os.rmdir" = "fs-write"
"os.chmod" = "fs-write"
"os.chown" = "fs-write"
"os.truncate" = "fs-write"
# --- native code / arbitrary memory (defeats all enforcement) ---
"ctypes.*" = "agent-deny"
"mmap.__new__" = "agent-deny"
# --- dynamic code construction (AST can't see these runtime paths) ---
"code.__new__" = "agent-deny"
"function.__new__" = "agent-deny"
"marshal.loads" = "agent-deny"
"marshal.load" = "agent-deny"
"pickle.find_class" = "agent-deny"
# --- interpreter introspection / hook tampering / remote code ---
"sys.settrace" = "agent-deny"
"sys.setprofile" = "agent-deny"
"sys.monitoring.register_callback" = "agent-deny"
"sys.addaudithook" = "agent-deny"
"sys.remote_exec" = "agent-deny"
"setopencodehook" = "agent-deny"
"cpython.remote_debugger_script" = "agent-deny"
"cpython._PySys_ClearAuditHooks" = "agent-deny"
"cpython.PyConfig_Set" = "agent-deny"
# --- native library loading via sqlite ---
"sqlite3.load_extension" = "agent-deny"
"sqlite3.enable_load_extension" = "agent-deny"
# --- process creation / control beyond the shell policy ---
"os.fork" = "agent-deny"
"os.forkpty" = "agent-deny"
"pty.spawn" = "agent-deny"
"os.startfile" = "agent-deny"
"webbrowser.open" = "agent-deny"
"builtins.breakpoint" = "agent-deny"
"pdb.Pdb" = "agent-deny"
# --- network egress: deny from agent code, allow trusted libraries (agents
#     have no socket path of their own). Host/port scoping is a future
#     refinement of the `network` disposition. ---
"socket.connect" = "network"
"socket.bind" = "network"
"socket.sendto" = "network"
"socket.sendmsg" = "network"
"urllib.Request" = "network"
# --- process creation: subprocess.Popen is the universal spawn chokepoint,
#     validated against [shell.*] policies (the "shell" disposition). The raw
#     os.exec/system/posix_spawn/spawn primitives are denied from agent code
#     (defense-in-depth behind the os proxy; internal stdlib calls from
#     subprocess.py come from a TRUSTED frame and pass through). ---
"subprocess.Popen" = "shell"
"os.exec" = "agent-deny"
"os.system" = "agent-deny"
"os.posix_spawn" = "agent-deny"
"os.spawn" = "agent-deny"
# import: enforced by the import allowlist (builtins.__import__ guard +
# sys.meta_path finder). Kept at `observe` for --debug inventory only: it is NOT
# promoted to an enforcing disposition. On CPython 3.14 the `import` audit event
# fires only on a sys.modules cache MISS (inside importlib._find_and_load), never
# for already-cached modules — so it cannot see the cached-transitive-dep gap an
# audit backstop would target, and on cache misses the meta_path _ImportBlocker
# already enforces.
"import" = "observe"
"socket.getaddrinfo" = "observe"
"socket.gethostbyname" = "observe"
"os.scandir" = "observe"
"os.listdir" = "observe"
"os.walk" = "observe"
"glob.glob" = "observe"
"os.chdir" = "observe"
"os.putenv" = "observe"
"os.unsetenv" = "observe"
"os.add_dll_directory" = "observe"
"winreg.*" = "observe"

# Per-library runtime restrictions.
# mode = "allow": permit everything except functions matching deny patterns.
# mode = "deny": block everything except functions matching allow patterns.
#
# Fields:
#   module_allow — regex patterns for functions/attributes accessible on the module (mode="deny")
#   module_deny  — regex patterns for functions/attributes blocked on the module (mode="allow")
#   class_allow  — regex patterns for methods allowed on instances returned by allowed functions (mode="deny")
#   class_deny   — regex patterns for methods blocked on classes in the module (mode="allow")
[restrictions]

[restrictions.boto3]
mode = "deny"
module_allow = ["client"]
class_allow = ["list_.*", "describe_.*", "get_.*", "head_.*", "scan", "query", "start_query", "stop_query"]

[restrictions.polars]
mode = "allow"
# serialize() does file I/O in Rust (bypasses Python open()/pathlib scoping and
# the .pyddock/ guard) and is not named write_*/sink_*. Blocked by name here.
# NOTE: this also blocks the in-memory serialize() (returns bytes) used for
# caching/transport; an argument-aware guard would be needed to allow that.
module_deny = ["write_.*", "sink_.*", "serialize"]
class_deny = ["write_.*", "sink_.*", "serialize"]

[restrictions.P4]
mode = "deny"
module_allow = ["P4", "P4Exception"]
class_allow = [
    # Connection lifecycle (inherits env/P4CONFIG — cannot override target)
    "connect", "disconnect", "run_login", "connected",
    # Read-only queries
    "run_filelog", "run_files", "run_describe", "run_changes",
    "run_print", "run_where", "run_info",
    "run_fstat", "run_have", "run_dirs", "run_depots",
    "run_clients", "run_users", "run_opened",
    "run_diff", "run_diff2", "run_annotate",
    "run_streams",
    # Workspace write operations (no submit)
    "run_edit", "run_add", "run_delete", "run_revert",
    "run_sync", "run_reconcile", "run_resolve",
    "run_shelve", "run_unshelve",
    "run_integrate", "run_move", "run_reopen",
    # Changelist management (not submit)
    "run_change",
    # Spec reading
    "fetch_.*", "iterate_.*",
]

# GitPython shells out for all git operations, but captured `from subprocess
# import Popen` at import — so the subprocess proxy can't see it. The [shell.git]
# policy is enforced at the audit layer's `shell` disposition (subprocess.Popen
# event fires for all spawns regardless of how Popen was obtained). This
# restriction just limits which module-level classes are accessible.
[restrictions.git]
mode = "deny"
module_allow = ["Repo", "InvalidGitRepositoryError", "GitCommandError", "NoSuchPathError"]
class_allow = [".*"]


# Shell command policies for run_shell and subprocess.run() inside run_python.
# Each [shell.<name>] section defines which commands an agent can execute.
# Commands not matching any section are denied by default.
#
# Fields:
#   command  — regex matched against the command string (defaults to ^<name>$ if omitted)
#   mode     — "deny" (block all args except allow patterns) or "allow" (permit all except deny)
#   allow    — regex patterns for permitted arg strings (mode = "deny"); matched with re.match
#   deny     — regex patterns that ALWAYS reject when matched, in either mode. Checked
#              before allow and searched ANYWHERE in the arg string (re.search), so a
#              dangerous token can't hide mid-command behind an allowed prefix. Use for
#              tokens unsafe regardless of subcommand (e.g. git's ext:: transport).
#   arg_paths — path scanning for arguments that look like filesystem paths:
#       "workspace" (default) — block args resolving outside the workspace or into
#                               protected dirs (.pyddock/, workspace modules, script dirs)
#       "protected"           — only block args resolving into protected dirs
#       "none"                — no path scanning (fully trust the command)
#
# Args are space-joined before matching: ["filelog", "//depot/..."] → "filelog //depot/..."
# allow patterns use re.match() (anchored at start); deny patterns use re.search() (anywhere).

# Local git: read queries + workspace writes, but no push / remote-write /
# config-write. The read-only plumbing verbs below are also what GitPython
# shells out to internally (iter_commits, remotes, head, ...), so they keep
# GitPython working under the git.cmd.Git.execute guard.
[shell.git]
mode = "deny"
# Deny-always-wins: command-execution transports/options unsafe in any git
# subcommand (fetch/pull/ls-remote/...). Blocks the ext:: transport and the
# upload/receive-pack hooks (local RCE), regardless of the allow-list below.
# Also blocks config/command-injection globals that, if injected before the
# subcommand, enable arbitrary code execution (-c core.sshCommand=..., etc.).
deny = [
    "ext::", "--upload-pack", "--receive-pack", "^-c(\\s|$)",
    "--config-env", "--exec-path",
    # rebase/push/fetch --exec: runs an arbitrary per-commit shell command
    # (git rebase -x/--exec) and is also the documented synonym for
    # --receive-pack (push) / --upload-pack (fetch). No legitimate sandbox use —
    # safe to deny in every subcommand. Does NOT match --exec-path (above).
    "--exec(\\s|=|$)",
    # rebase short form: git rebase -x <cmd> (and "git pull --rebase ... -x").
    # Scoped to the rebase token via re.search so it does NOT clobber the
    # unrelated, legitimate "git clean -x" (remove ignored files).
    "\\brebase\\b.*\\s-x(\\s|$)",
]
allow = [
    # Read-only queries
    "status(\\s|$)", "log(\\s|$)", "diff(\\s|$)", "show(\\s|$)", "rev-parse(\\s|$)",
    "ls-files(\\s|$)", "ls-tree(\\s|$)", "cat-file(\\s|$)", "blame(\\s|$)",
    "describe(\\s|$)", "shortlog(\\s|$)",
    # Read-only plumbing (what GitPython shells out to internally)
    "rev-list(\\s|$)", "for-each-ref(\\s|$)", "show-ref(\\s|$)",
    "ls-remote(\\s|$)", "version(\\s|$)", "var(\\s|$)",
    "remote$", "remote (-v|--verbose)$", "remote show(\\s|$)", "remote get-url(\\s|$)",
    "config --get(\\s|$)", "config --get-all(\\s|$)", "config --get-regexp(\\s|$)",
    "config --list(\\s|$)", "config -l(\\s|$)",
    # Local-only writes: mutate this clone's refs / HEAD / index / worktree, but
    # never the remote (no push). Trashing the local workspace is in scope.
    "branch(\\s|$)", "symbolic-ref(\\s|$)",
    "add(\\s|$)", "rm(\\s|$)", "mv(\\s|$)", "restore(\\s|$)",
    "checkout(\\s|$)", "switch(\\s|$)",
    "commit(\\s|$)", "merge(\\s|$)", "rebase(\\s|$)", "cherry-pick(\\s|$)",
    "reset(\\s|$)", "stash(\\s|$)", "clean(\\s|$)",
    "tag(\\s|$)",
    # Remote sync: download into this clone only (no push)
    "fetch(\\s|$)", "pull(\\s|$)",
]

# git honors many env vars that lead to command execution or out-of-tree access.
# These are the env-side equivalents of the [shell.git] -c / transport denials.
[shell.git.env]
deny = [
    "GIT_SSH", "GIT_SSH_COMMAND", "GIT_PROXY_COMMAND",  # arbitrary command on transport
    "GIT_ASKPASS", "SSH_ASKPASS",                       # arbitrary command on credential/password prompt
    "GIT_EXTERNAL_DIFF", "GIT_PAGER",                   # arbitrary command on diff / paging
    "GIT_EDITOR", "GIT_SEQUENCE_EDITOR",                # arbitrary command on commit-msg edit / rebase-todo edit (rebase -i)
    "GIT_EXEC_PATH",                                    # git-* subprogram lookup dir (env form of the denied --exec-path)
    "GIT_CONFIG.*",                                     # incl. GIT_CONFIG_COUNT/KEY_n/VALUE_n injection
    "GIT_DIR", "GIT_WORK_TREE", "GIT_INDEX_FILE",       # redirect repo/index out of tree
    "GIT_COMMON_DIR", "GIT_OBJECT_DIRECTORY",           # redirect common dir / object store out of tree
    "GIT_ALTERNATE_OBJECT_DIRECTORIES",
    "GIT_TEMPLATE_DIR",                                 # template dir (incl. hooks) copied into new repos on init/clone
    "GIT_TRACE.*",                                      # GIT_TRACE=<path> → arbitrary file write
]

[shell.p4]
mode = "deny"
# Verbs anchored with (\s|$) for the same reason as [shell.git]: a short verb
# must not prefix-match a longer one (e.g. "change" must not swallow "changes",
# "info" must not match "information"). Not end-anchored (see [shell.git]).
allow = [
    # Read-only queries
    "filelog(\\s|$)", "files(\\s|$)", "describe(\\s|$)", "changes(\\s|$)",
    "print(\\s|$)", "where(\\s|$)", "info(\\s|$)",
    "fstat(\\s|$)", "have(\\s|$)", "dirs(\\s|$)", "depots(\\s|$)",
    "clients(\\s|$)", "users(\\s|$)",
    "opened(\\s|$)", "diff(\\s|$)", "diff2(\\s|$)", "annotate(\\s|$)",
    "streams(\\s|$)", "client -o(\\s|$)", "stream -o(\\s|$)",
    # Workspace write operations (no submit)
    "edit(\\s|$)", "add(\\s|$)", "delete(\\s|$)", "revert(\\s|$)",
    "sync(\\s|$)", "reconcile(\\s|$)", "resolve(\\s|$)",
    "shelve(\\s|$)", "unshelve(\\s|$)",
    "integrate(\\s|$)", "move(\\s|$)", "reopen(\\s|$)",
    # Changelist management (not submit)
    "change(\\s|$)",
]

[shell.p4.env]
# p4 honors several vars that run an external program or load settings (which
# can themselves re-introduce an exec var) — the env-side equivalents of the
# command-execution denials. P4CONFIG and P4ENVIRO point to settings files that
# can define P4EDITOR/P4DIFF/etc., so locking only the exec vars without locking
# the loaders leaves a redirect (a bare `P4ENVIRO=z.txt` carries no separator,
# so the inert filter alone won't stop it — hence the hard-lock here).
deny = [
    "P4PORT", "P4CONFIG", "P4ENVIRO",        # connection target / settings-file loaders
    "P4DIFF.*",                              # arbitrary command on diff (incl. P4DIFFUNICODE)
    "P4MERGE.*",                             # arbitrary command on resolve/merge (incl. P4MERGEUNICODE)
    "P4EDITOR",                              # arbitrary command on spec edit (p4 change, ...)
    "P4PAGER",                               # arbitrary command on paged output
    "P4LOGINSSO",                            # arbitrary command on SSO login
    "P4ALIASES",                             # aliases file can rewrite an allowed verb into a denied one (allow-list bypass)
]

[shell.docker]
# Read-only / inspection ONLY. All container lifecycle (compose up/down/build/
# run/exec/stop/restart/pull) is intentionally disallowed: the compose file lives
# in the agent-writable workspace, so any container start can bind-mount the host
# and run as root — a full host escape the arg/path scanners cannot see (the
# dangerous bits live inside the YAML, not the args). If you genuinely need
# container lifecycle, grant it through a trusted shell tool, not pyddock.
# Verbs anchored with (\s|$) (see [shell.git]).
mode = "deny"
allow = [
    # Compose inspection (read-only)
    "compose ps(\\s|$)", "compose logs(\\s|$)", "compose config(\\s|$)",
    "compose top(\\s|$)", "compose images(\\s|$)", "compose port(\\s|$)",
    "compose version(\\s|$)",
    # Container/image inspection (read-only)
    "ps(\\s|$)", "inspect(\\s|$)", "logs(\\s|$)", "top(\\s|$)", "stats(\\s|$)", "port(\\s|$)",
    "images(\\s|$)", "image ls(\\s|$)", "image inspect(\\s|$)", "image history(\\s|$)",
    # Volume & network inspection (read-only)
    "volume ls(\\s|$)", "volume inspect(\\s|$)",
    "network ls(\\s|$)", "network inspect(\\s|$)",
    # System info (read-only)
    "system df(\\s|$)", "version(\\s|$)", "info(\\s|$)",
]

[shell.docker.env]
deny = ["DOCKER_HOST", "DOCKER_CONFIG", "DOCKER_CONTEXT"]

# Path-like command patterns trigger automatic write protection — run_python cannot
# write to directories matching these patterns, preventing write-then-execute escalation.
# Script interpreter mapping is automatic: .ps1→powershell, .py→python, .sh→bash, .bat→cmd /c.
#[shell.kiro-scripts]
#command = "\\.kiro/scripts/.*"
#mode = "allow"
#deny = []
#arg_paths = "workspace"

# Environment policy for subprocess spawns (run_shell + subprocess.* in run_python).
#
# The child's environment is always derived from a known-good SNAPSHOT captured
# at startup. Agent-supplied env= is treated as OVERRIDES on that snapshot —
# never a replacement — so a child always keeps the trusted base. Per key, an
# override is permitted only if it is one of:
#   * equal to the snapshot value (a no-op),
#   * empty  (explicit removal of the var), or
#   * permitted by the policy below.
#
# [env] is the GLOBAL base, applied to every spawn (loader/resolution vars that
# are dangerous regardless of command). The per-command [shell.<cmd>.env] blocks
# (defined under each command's section above) add command-specific locks on
# top. Deny always wins (global deny ∪ command deny).
#
# default — disposition for keys NOT matched by any deny pattern:
#   "inert"    — allow an override only if the value is not path-like or URI-like
#                (cheap, deterministic; no `which`, no filesystem access). This is
#                the coverage net for vars we didn't enumerate: an unknown var
#                can't carry a path/URI payload that redirects a tool.
#   "snapshot" — allow an override only if it equals the snapshot value or is empty.
# deny — regex patterns (re.fullmatch against the KEY name) for keys hard-locked
#        to snapshot-or-empty regardless of the value. Use for keys interpreted
#        as code/config/loader BY DESIGN, where value inspection is blind (a bare
#        command name like GIT_SSH_COMMAND=calc is not path-like, so only a lock
#        is sound). The proxy enforces the full policy and rewrites env; the audit
#        layer (captured-reference spawns like GitPython) enforces these locks only.
[env]
default = "inert"
# Patterns are re.fullmatch against the KEY name, matched CASE-INSENSITIVELY
# (see _env_key_locked) — Windows env names are case-insensitive, so a
# case-sensitive lock would be bypassable via `Path`/`home`. No (?i) needed here.
deny = [
    # --- command / library resolution (PATH family + dynamic loaders) ---
    ".*PATH.*",                   # PATH, PATHEXT, PYTHONPATH, PSModulePath, GIT_EXEC_PATH,
                                  #   HOMEPATH, CLASSPATH, NODE_PATH, MANPATH, ... (resolution hijack)
    "LD_.*", "DYLD_.*",           # ELF / Mach-O loader injection (LD_PRELOAD, DYLD_INSERT_LIBRARIES, ...)
    "PYTHON.*",                   # python (.py) startup/home/path (PYTHONSTARTUP, PYTHONHOME, ...)
    "COMSPEC",                    # cmd /c mapping (.bat)
    # --- home / config discovery (redirect a tool to attacker-controlled config) ---
    ".*HOME.*",                   # HOME, HOMEDRIVE, HOMEPATH, GNUPGHOME, JAVA_HOME, XDG_*_HOME, ...
    "USERPROFILE",                # Windows home fallback — git global ~/.gitconfig discovery
    "XDG_.*",                     # XDG_CONFIG_HOME/_DIRS, XDG_DATA_HOME/_DIRS, XDG_CACHE_HOME (config/data discovery)
    # --- shell / interpreter startup & option injection ---
    "BASH.*", "ENV", "PROMPT_COMMAND",  # shell startup exec (BASH_ENV, BASH_FUNC_*, ...)
    "PERL5.*",                    # PERL5OPT (-M<module> runs code), PERL5LIB
    "_?JAVA.*",                   # JAVA_TOOL_OPTIONS, _JAVA_OPTIONS (JVM arg injection); JAVA_HOME also via .*HOME.*
    "NODE_OPTIONS",               # node --require / --import code injection
    "RUBY.*",                     # RUBYOPT (-r<lib> runs code), RUBYLIB
    "LESS.*",                     # LESSOPEN / LESSCLOSE input-preprocessor command exec
    # --- scratch-file redirection ---
    "TMPDIR", "TEMP", "TMP",
    # --- generic external-command hooks ---
    "EDITOR", "VISUAL", "PAGER",
]

# Custom denial hints — appended to rejection messages when the pattern matches
# the attempted action. These do NOT define new deny rules; they only provide
# better guidance after a rejection has already occurred.
#
# Match targets by rejection type:
#   Shell command rejection  → command string (e.g. "aws", "aws.exe", "curl")
#   Shell args rejection     → "command args..." (e.g. "git push origin main")
#   Import rejection         → full module name (e.g. "requests", "paramiko.client")
#   Restriction rejection    → "module.attribute" (e.g. "boto3.resource", "polars.write_csv")
#
# Regex uses re.search() against the attempted value. First match wins.
[deny_messages]
"^aws(\\.exe)?$" = "AWS CLI is not allowed. Use `import boto3` in run_python instead (client factory with read-only restrictions)."
"^git push" = "git push is not allowed. Stage changes locally and leave pushing for human review."
"^git remote" = "git remote is not allowed. Remote configuration cannot be modified from the sandbox."
"^git " = "This git operation is not in the allowed list. Operations should be limited to side effects within the local workspace."
"^p4 submit" = "p4 submit is not allowed. Use `p4 shelve` to stage changes for human review."
"^p4 " = "This p4 operation is not in the allowed list. Operations should be limited to side effects within the local workspace."
"^requests(\\.|$)" = "Open network access is not permitted in pyddock. Use a different tool if available (e.g. web_fetch)."
"^paramiko(\\.|$)" = "SSH access is not permitted in pyddock. Use a different tool for remote operations."
"^boto3\\.(resource|Resource)" = "Only boto3.client() is allowed (not resource/Session). Use boto3.client('<service>') to create service clients."
"^polars\\.(write_|sink_)" = "Polars write/sink operations are blocked. Write output files using Python builtins (open/pathlib) in run_python instead."
"^(bash|sh)(\\.exe)?$" = "Shell interpreters are not allowed. Write your logic directly in run_python, or use run_shell with an approved command."
"^(powershell|pwsh)(\\.exe)?$" = "PowerShell is not allowed. Write your logic directly in run_python, or use run_shell with an approved command."
"^python(\\.exe)?$" = "Python is restricted to the run_python sandbox. Use the available runtime features."
"^docker " = "Only `docker compose` and read-only inspection commands are allowed. Use compose for container lifecycle."
"^dateutil(\\.|$)" = "dateutil is not directly available. Use `datetime.fromisoformat()` for ISO 8601 parsing, or `datetime.strptime()` for custom formats."
